name: WRT-CORE

on:
  workflow_dispatch:
  repository_dispatch:
  schedule:
    - cron: 0 18 * * *

permissions:
  contents: write
  actions: write

env:
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt update -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib \
          g++-multilib gettext git libncurses-dev libssl-dev python3 python3-distutils \
          rsync unzip zlib1g-dev file wget curl

      - name: Clone source code
        run: |
          git clone https://github.com/LiBwrt/openwrt-6.x.git wrt
          cd wrt
          git checkout main-nss

      - name: Load custom feeds
        run: |
          cd wrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Load custom packages
        run: |
          chmod +x $GITHUB_WORKSPACE/Scripts/Packages.sh
          cd wrt
          $GITHUB_WORKSPACE/Scripts/Packages.sh

      - name: Generate config
        run: |
          chmod +x $GITHUB_WORKSPACE/Scripts/function.sh
          cd wrt
          . $GITHUB_WORKSPACE/Scripts/function.sh
          generate_config

      - name: Custom Settings (强制插件 + 检查)
        run: |
          cd wrt

          # === 强制写入插件 ===
          echo "CONFIG_PACKAGE_luci-app-lucky=y" >> .config
          echo "CONFIG_PACKAGE_lucky=y" >> .config

          echo "CONFIG_PACKAGE_luci-app-mosdns=y" >> .config
          echo "CONFIG_PACKAGE_mosdns=y" >> .config
          echo "CONFIG_PACKAGE_v2dat=y" >> .config

          echo "CONFIG_PACKAGE_luci-app-microsocks=y" >> .config
          echo "CONFIG_PACKAGE_microsocks=y" >> .config

          # === 应用配置 ===
          make defconfig

          echo "========== 插件检查 =========="
          grep -E "lucky|mosdns|microsocks" .config || true

          # === 强制校验（防止编译出垃圾固件）===
          grep -q "^CONFIG_PACKAGE_luci-app-lucky=y" .config || exit 1
          grep -q "^CONFIG_PACKAGE_lucky=y" .config || exit 1

          grep -q "^CONFIG_PACKAGE_luci-app-mosdns=y" .config || exit 1
          grep -q "^CONFIG_PACKAGE_mosdns=y" .config || exit 1

          grep -q "^CONFIG_PACKAGE_luci-app-microsocks=y" .config || exit 1
          grep -q "^CONFIG_PACKAGE_microsocks=y" .config || exit 1

      - name: Download package
        run: |
          cd wrt
          make download -j$(nproc)

      - name: Compile firmware
        run: |
          cd wrt
          make -j$(nproc) || make -j1 V=s

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: wrt/bin/targets/

      - name: Release firmware
        uses: ncipollo/release-action@v1
        with:
          tag: NOWIFI-$(date +%Y%m%d-%H%M)
          artifacts: "wrt/bin/targets/*/*/*"
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
